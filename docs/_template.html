<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crucible — EUR/USD Strategy Engine</title>
<style>
  :root { --bg:#0f1419; --card:#1a2129; --text:#e6e8ea; --dim:#8b949e;
          --green:#3fb950; --red:#f85149; --blue:#58a6ff; --amber:#d29922; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:15px/1.5 -apple-system,'Segoe UI',sans-serif; padding:2rem; max-width:1100px; margin:auto; }
  h1 { font-size:1.6rem; } h1 span { color:var(--dim); font-weight:400; font-size:1rem; }
  h2 { font-size:1.05rem; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.6rem; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1rem; margin-top:1.5rem; }
  .card { background:var(--card); border:1px solid #2d333b; border-radius:8px; padding:1.1rem; }
  .wide { grid-column:1/-1; }
  table { width:100%; border-collapse:collapse; font-size:.88rem; }
  th,td { text-align:left; padding:.35rem .5rem; border-bottom:1px solid #2d333b; }
  th { color:var(--dim); font-weight:500; }
  .ok { color:var(--green); } .bad { color:var(--red); } .warn { color:var(--amber); }
  .big { font-size:1.5rem; font-weight:600; }
  .dim { color:var(--dim); font-size:.85rem; }
  svg { width:100%; height:220px; }
  .legend { font-size:.8rem; color:var(--dim); }
  .legend b { font-weight:600; }
</style>
</head>
<body>
<h1>Crucible <span>· EUR/USD strategy perfection engine</span></h1>
<p class="dim" id="generated"></p>
<div class="grid">
  <div class="card"><h2>Active configuration</h2><div id="active"></div></div>
  <div class="card"><h2>Latest regime classification</h2><div id="regime"></div></div>
  <div class="card wide"><h2>Champion Zero vs evolved system</h2>
    <div class="legend"><b style="color:var(--dim)">— Champion Zero</b> &nbsp;
    <b style="color:var(--blue)">— Evolved</b></div>
    <svg id="equity" viewBox="0 0 1000 220" preserveAspectRatio="none"></svg>
    <div id="champion"></div></div>
  <div class="card wide"><h2>Parameter change log</h2><div id="changes"></div></div>
  <div class="card wide"><h2>Live-vs-backtest divergence</h2><div id="divergence"></div></div>
</div>
<script>
const DATA = /*__DATA__*/null;
const $ = id => document.getElementById(id);
if (!DATA) {
  document.body.innerHTML += '<p class="dim">No run data yet — the dashboard is rebuilt automatically after each run.</p>';
} else {
  $('generated').textContent = 'Generated ' + DATA.generated;
  const a = DATA.active;
  $('active').innerHTML = `<div class="big">${a.regime}</div>
    <div class="dim">${a.params_file}</div>
    ${a.fallback_champion_zero ? '<div class="warn">stale set — Champion Zero fallback active</div>' : ''}
    <div class="dim">updated ${a.updated}</div>`;
  const r = DATA.regime && DATA.regime.decision;
  $('regime').innerHTML = r ? `<div class="big">${r.regime}</div>
    <div class="dim">ADX ${r.adx} · ATR pctile ${r.atr_percentile} · rule ${r.rule}</div>` : '<span class="dim">no classification logged yet</span>';
  const ch = DATA.champion;
  if (ch) {
    const lead = ch.evolved_leads;
    $('champion').innerHTML = `<p class="${lead ? 'ok' : 'bad'}">Evolved system ${lead ? 'leads' : 'TRAILS'}:
      ${ch.evolved.net_profit_pips} vs ${ch.champion_zero.net_profit_pips} pips net
      ${ch.warning_90d ? ' · <span class="warn">90-day warning</span>' : ''}
      ${ch.suspend_180d ? ' · <span class="bad">180-day suspension</span>' : ''}</p>`;
    const draw = (pts, color) => {
      if (!pts || pts.length < 2) return '';
      const min = Math.min(...pts), max = Math.max(...pts), span = (max - min) || 1;
      const d = pts.map((v, i) => `${i ? 'L' : 'M'}${(i / (pts.length - 1) * 1000).toFixed(1)},${(210 - (v - min) / span * 200).toFixed(1)}`).join('');
      return `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
    };
    $('equity').innerHTML = draw(ch.champion_zero_equity, '#8b949e') + draw(ch.evolved_equity, '#58a6ff');
  } else {
    $('champion').innerHTML = '<span class="dim">no optimization run recorded yet</span>';
  }
  $('changes').innerHTML = DATA.changes.length
    ? '<table><tr><th>Date</th><th>Regime</th><th>Outcome</th><th>Failed gates</th></tr>' +
      DATA.changes.map(c => `<tr><td>${c.date}</td><td>${c.regime}</td>
        <td class="${c.accepted ? 'ok' : 'dim'}">${c.accepted ? 'accepted' : 'rejected'}</td>
        <td>${c.failed.join(', ') || '—'}</td></tr>`).join('') + '</table>'
    : '<span class="dim">no parameter changes yet</span>';
  $('divergence').innerHTML = DATA.divergence.length
    ? '<table><tr><th>Date</th><th>Fwd expectancy</th><th>BT expectancy</th><th>Fwd WR</th><th>BT WR</th><th>Alert</th></tr>' +
      DATA.divergence.map(d => `<tr><td>${d.date}</td><td>${d.forward_expectancy}</td>
        <td>${d.backtest_expectancy} ± ${d.expectancy_band}</td><td>${d.forward_win_rate}</td>
        <td>${d.backtest_win_rate}</td><td class="${d.alert ? 'bad' : 'ok'}">${d.alert ? 'ALERT' : 'ok'}</td></tr>`).join('') + '</table>'
    : '<span class="dim">fewer than 30 closed forward signals so far</span>';
}
</script>
</body>
</html>
