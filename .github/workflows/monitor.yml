name: monitor

on:
  schedule:
    # Every 8 hours, aligned to 00:00 / 08:00 / 16:00 EAT (East Africa Time,
    # UTC+3 fixed — no daylight saving, so this never drifts). EAT 00:00 is
    # UTC 21:00 the previous day; 08:00/16:00 EAT are UTC 05:00/13:00.
    # No weekday filter: forex is closed Sat/Sun anyway, and the refresh
    # logic already treats a quiet weekend as a normal no-op, not a failure.
    - cron: "0 21,5,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crucible-runs        # never overlap with the optimization/evolve runs
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # hard ceiling: lightweight run
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - run: pip install -r requirements.txt

      - name: Monitoring run
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python -m src.data --refresh
          python -m src.data --context
          python -m src.regime --apply
          python -m src.forward --log
          # Monthly checks: first Monday of the month (UTC calendar day —
          # EAT 00:00 falls on the PREVIOUS UTC day, so this is checked at
          # the 05:00 UTC slot specifically, the one slot guaranteed to fire
          # exactly once per UTC calendar day rather than three times).
          if [ "$(date -u +%d)" -le 7 ] && [ "$(date -u +%u)" = "1" ] && [ "$(date -u +%H)" = "05" ]; then
            python -m src.forward --divergence
            python -m src.data --reconcile
          fi
          python -m src.report --daily

      - name: Commit results (allowed paths only)
        run: |
          git config user.name "crucible-bot"
          git config user.email "crucible-bot@users.noreply.github.com"
          git add data/candles results docs config/active.json
          git diff --cached --quiet || git commit -m "monitor: run $(date -u +'%F %H:%M') UTC"
          git push
